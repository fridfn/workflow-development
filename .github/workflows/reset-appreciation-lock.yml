name: Reset Appreciation Lock
  
permissions:
  issues: write
  
on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  reset:
    runs-on: ubuntu-latest

    steps:
      - name: Remove label appreciated-today
        run: |
          ISSUE_NUMBER=1

          curl -s -X DELETE \
            -H "Authorization: token ${{ secrets.ACTIVITY_GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/labels/appreciated-today