name: Daily Commit Reminder (All Repo)

concurrency:
  group: daily-appreciation
  cancel-in-progress: true
  
permissions:
  issues: write
  contents: read
  
on:
  schedule:
    - cron: '0 * * * *' # tiap jam
  workflow_dispatch:
  
jobs:
  lock-check:
    uses: ./.github/workflows/streak.lock.yml
    secrets: inherit
    
  check-activity:
    runs-on: ubuntu-latest
    needs: lock-check
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      # =========================
      # ENSURE LABEL
      # =========================
      - name: Ensure appreciated-today label exists
        env:
          TOKEN: ${{ secrets.ACTIVITY_GITHUB_TOKEN }}
        run: |
          REPO="fridfn/workflow-development"
          LABEL_NAME="appreciated-today"

          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $TOKEN" \
            https://api.github.com/repos/$REPO/labels/$LABEL_NAME)

          if [ "$status" -ne 200 ]; then
            curl -s -X POST \
              -H "Authorization: token $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/$REPO/labels \
              -d '{
                "name": "appreciated-today",
                "color": "6b00c6",
                "description": "Prevent duplicate appreciation message"
              }'
          fi

      # =========================
      # CHECK ACTIVITY
      # =========================
      - name: Check GitHub activity
        id: activity
        run: |
          username="fridfn"

          response=$(curl -s \
            -H "Authorization: token ${{ secrets.ACTIVITY_GITHUB_TOKEN }}" \
            https://api.github.com/users/$username/events)

          today=$(date -u +%Y-%m-%d)

          has_push=$(echo "$response" | jq "[.[] | select(.type==\"PushEvent\" and (.created_at | startswith(\"$today\")))] | length")

          if [ "$has_push" -gt 0 ]; then
            echo "no_commit=false" >> $GITHUB_OUTPUT
          else
            echo "no_commit=true" >> $GITHUB_OUTPUT
          fi

      # =========================
      # SET MODE (NO COMMITTED)
      # =========================
      - name: Send Reminder (No Commit)  
        if: steps.activity.outputs.no_commit == 'true'  
        env:  
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}  
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}  
        run: |  
          export TZ=Asia/Jakarta  
          hour=$(date +%H)  
            
          mode=""
          send=false
          
          if [ "$hour" -ge 14 ] && [ "$hour" -lt 19 ]; then
            # sore → santai (jarang)
            [ $((RANDOM % 4)) -eq 0 ] && send=true
            mode="warning"  
            
          elif [ "$hour" -ge 19 ] && [ "$hour" -lt 23 ]; then
            # malam → lebih sering
            [ $((RANDOM % 3)) -eq 0 ] && send=true
            mode="last_warning"  
            
          elif [ "$hour" -ge 23 ] || [ "$hour" -lt 7 ]; then
            # larut → hampir selalu
            [ $((RANDOM % 2)) -eq 0 ] && send=true
            mode="final_warning"  
          fi
          
          if [ "$send" = false ]; then
            echo "Skip (smart interval)"
            exit 0
          fi
          
          echo "mode=$mode" >> $GITHUB_ENV
          
      # =========================
      # SET MODE (COMMITTED)
      # =========================
      - name: Set Mode (Committed)
        if: steps.activity.outputs.no_commit == 'false' && needs.lock-check.outputs.allowed == 'true'
        run: |
          export TZ=Asia/Jakarta
          hour=$(date +%H)
          
          mode=""
          
          if [ "$hour" -ge 12 ] && [ "$hour" -lt 16 ]; then
            mode="ambitious"
          elif [ "$hour" -ge 16 ] && [ "$hour" -lt 18 ]; then
            mode="productive"
          elif [ "$hour" -ge 18 ] && [ "$hour" -lt 21 ]; then
            mode="persistent"
          elif [ "$hour" -ge 21 ] || [ "$hour" -lt 7 ]; then
            mode="consistent"
          fi
          
          if [ -z "$mode" ]; then
            echo "No mode committed → exit"
            exit 0
          fi
          
          echo "mode=$mode" >> $GITHUB_ENV
          
      # =========================
      # GET MESSAGE
      # =========================
      - name: Get Message
        if: (steps.activity.outputs.no_commit == 'false' && needs.lock-check.outputs.allowed == 'true') || steps.activity.outputs.no_commit == 'true'
        run: |
          chmod +x .github/scripts/get.message.sh
          OUTPUT=$(mode="$mode" bash .github/scripts/get.message.sh)

          echo "$OUTPUT"
          echo "$OUTPUT" >> $GITHUB_ENV

      # =========================
      # SEND TELEGRAM
      # =========================
      - name: Send Telegram
        if: (steps.activity.outputs.no_commit == 'false' && needs.lock-check.outputs.allowed == 'true') || steps.activity.outputs.no_commit == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          chmod +x .github/scripts/send.telegram.sh
          bash .github/scripts/send.telegram.sh

      # =========================
      # SET LOCK
      # =========================
      - name: Set Appreciation Lock
        if: steps.activity.outputs.no_commit == 'false' && needs.lock-check.outputs.allowed == 'true'
        env:
          TOKEN: ${{ secrets.ACTIVITY_GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=1
          REPO="fridfn/workflow-development"

          curl -s -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/labels \
            -d '{"labels": ["appreciated-today"]}'