# ==========================================
# 🔔 Daily Commit Reminder (All Repo)
# ------------------------------------------
# Tujuan:
# - Monitor activity commit setiap jam
# - Kirim reminder jika belum commit
# - Kirim appreciation jika sudah commit
# - Gunakan lock system untuk mencegah duplicate
#
# Flow:
# 1. Check lock (apakah sudah ada commit hari ini)
# 2. Ensure label tersedia
# 3. Check activity hari ini
# 4. Tentukan mode (reminder / appreciation)
# 5. Generate message (tone + random)
# 6. Kirim ke Telegram
# 7. Set lock jika sudah commit
# ==========================================

name: Daily Commit Reminder (All Repo)

concurrency:
  group: daily-appreciation
  cancel-in-progress: true
  
permissions:
  issues: write
  contents: read
  
on:
  schedule:
    - cron: '0 * * * *' # tiap jam
  workflow_dispatch:
  
jobs:
  lock-check:
    uses: ./.github/workflows/streak.lock.yml
    secrets: inherit
    
  check-activity:
    runs-on: ubuntu-latest
    needs: lock-check
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        
      # =========================
      # 🏷️ ENSURE LABEL
      # =========================
      - name: Ensure commit-today label exists
        env:
          TOKEN: ${{ secrets.ACTIVITY_GITHUB_TOKEN }}
        run: |
          echo "=============================="
          echo "🏷️ Ensure Label"
          echo "=============================="

          REPO="fridfn/workflow-development"
          LABEL_NAME="commit-today"

          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $TOKEN" \
            https://api.github.com/repos/$REPO/labels/$LABEL_NAME)

          echo "🔍 Label status: $status"

          if [ "$status" -ne 200 ]; then
            echo "➕ Creating label..."

            curl -s -X POST \
              -H "Authorization: token $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/$REPO/labels \
              -d '{
                "name": "commit-today",
                "color": "6b00c6",
                "description": "Prevent duplicate appreciation message"
              }'

            echo "✅ Label created"
          else
            echo "✔️ Label already exists"
          fi

      # =========================
      # 🔍 CHECK ACTIVITY
      # =========================
      - name: Check GitHub activity
        id: activity
        run: |
          echo "=============================="
          echo "🔍 Checking Activity"
          echo "=============================="

          username="fridfn"
          today=$(date -u +%Y-%m-%d)

          echo "👤 User  : $username"
          echo "📅 Today : $today"

          response=$(curl -s \
            -H "Authorization: token ${{ secrets.ACTIVITY_GITHUB_TOKEN }}" \
            https://api.github.com/users/$username/events)

          has_push=$(echo "$response" | jq "[.[] | select(.type==\"PushEvent\" and (.created_at | startswith(\"$today\")))] | length")

          echo "📊 Push count: $has_push"

          if [ "$has_push" -gt 0 ]; then
            echo "no_commit=false" >> $GITHUB_OUTPUT
            echo "💜 Status: Active (sudah commit)"
          else
            echo "no_commit=true" >> $GITHUB_OUTPUT
            echo "🌙 Status: Idle (belum commit)"
          fi

      # =========================
      # ⚠️ REMINDER MODE
      # =========================
      - name: Send Reminder (No Commit)
        if: steps.activity.outputs.no_commit == 'true'
        
        env:
          TELEGRAM_TOKEN_AURIELLE: ${{ secrets.TELEGRAM_TOKEN_AURIELLE }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          echo "=============================="
          echo "⚠️ Reminder Mode"
          echo "=============================="
          
          chmod +x .github/scripts/core/*.sh
          source .github/scripts/core/mindset.sh
          
          mode=$(get_mode_by_no_commit)
          
          echo "🎯 Mode: $mode"
          echo "mode=$mode" >> $GITHUB_ENV
          echo "mode_message=reminder" >> $GITHUB_ENV
          
      - name: Next Step
        if: env.skip != 'true'
        run: |
          echo "Lanjut eksekusi steps selanjutnya..."
          
      # =========================
      # 💜 APPRECIATION MODE
      # =========================
      - name: Set Mode (Committed)
        if: steps.activity.outputs.no_commit == 'false' && needs.lock-check.outputs.allowed == 'true'
        run: |
          echo "=============================="
          echo "💜 Appreciation Mode"
          echo "=============================="
          
          chmod +x .github/scripts/core/*.sh
          source .github/scripts/core/mindset.sh
          
          mode=$(get_mode_by_commit)
          
          echo "🎯 Mode: $mode"
          echo "mode=$mode" >> $GITHUB_ENV
          echo "mode_message=appreciation" >> $GITHUB_ENV
          
      # =========================
      # 🎲 GET MESSAGE
      # =========================
      - name: Get Message
        if: (steps.activity.outputs.no_commit == 'false' && needs.lock-check.outputs.allowed == 'true') || steps.activity.outputs.no_commit == 'true'
        run: |
          echo "=============================="
          echo "🎲 Generate Message"
          echo "=============================="

          chmod +x .github/scripts/get.message.sh
          OUTPUT=$(mode="$mode" mode_message="$mode_message" bash .github/scripts/get.message.sh)

          echo "$OUTPUT"
          echo "$OUTPUT" >> $GITHUB_ENV

      # =========================
      # 📤 SEND TELEGRAM
      # =========================
      - name: Send Telegram
        if: (steps.activity.outputs.no_commit == 'false' && needs.lock-check.outputs.allowed == 'true') || steps.activity.outputs.no_commit == 'true'
        env:
          TELEGRAM_TOKEN_AURIELLE: ${{ secrets.TELEGRAM_TOKEN_AURIELLE }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          echo "=============================="
          echo "📤 Sending Message"
          echo "=============================="

          chmod +x .github/scripts/send.telegram.sh
          bash .github/scripts/send.telegram.sh

      # =========================
      # 🔒 SET LOCK
      # =========================
      - name: Set Appreciation Lock
        if: steps.activity.outputs.no_commit == 'false' && needs.lock-check.outputs.allowed == 'true'
        env:
          TOKEN: ${{ secrets.ACTIVITY_GITHUB_TOKEN }}
        run: |
          echo "=============================="
          echo "🔒 Setting Lock"
          echo "=============================="

          ISSUE_NUMBER=1
          REPO="fridfn/workflow-development"

          curl -s -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/labels \
            -d '{"labels": ["commit-today"]}'

          echo "✅ Lock set (commit-today)"