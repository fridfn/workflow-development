name: Daily Commit Reminder (All Repo)
  
concurrency:
  group: daily-appreciation
  cancel-in-progress: true
  
permissions:
  issues: write
  contents: read
  
on:
  schedule:
    - cron: '0 * * * *' # Jalan tiap jam
  workflow_dispatch:

jobs:
  lock-check:
    uses: ./.github/workflows/appreciation-lock.yml
    secrets: inherit
    
  check-activity:
    runs-on: ubuntu-latest
    needs: lock-check
    
    steps:
      - name: Check GitHub activity
        id: activity
        run: |
          username="fridfn"

          response=$(curl -s \
            -H "Authorization: token ${{ secrets.ACTIVITY_GITHUB_TOKEN }}" \
            https://api.github.com/users/$username/events)

          today=$(date -u +%Y-%m-%d)

          has_push=$(echo "$response" | jq "[.[] | select(.type==\"PushEvent\" and (.created_at | startswith(\"$today\")))] | length")

          if [ "$has_push" -gt 0 ]; then
            echo "no_commit=false" >> $GITHUB_OUTPUT
          else
            echo "no_commit=true" >> $GITHUB_OUTPUT
          fi

      # ❌ kalau belum commit
      - name: Send Reminder (No Commit)
        if: steps.activity.outputs.no_commit == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          # =========================
          # MODE N TIMEZONE
          # =========================
          
          export TZ=Asia/Jakarta
          hour=$(date +%H)
          
          mode=""
          if [ "$hour" -ge 17 ] && [ "$hour" -lt 19 ]; then
            mode="warning"
          elif [ "$hour" -ge 20 ] && [ "$hour" -lt 23 ]; then
            mode="final"
          elif [ "$hour" -ge 23 ] || [ "$hour" -lt 7 ]; then
            mode="last_warning"
          fi
          
          if [ -z "$mode" ]; then
            exit 0
          fi
          
          # =========================
          # MESSAGES (CASE)
          # =========================
          
          data=$(cat .github/messages/reminder.json)

          greeting=$(echo "$data" | jq -r --arg mode "$mode" '.[$mode].greetings[]' | shuf -n 1)
          
          message=$(echo "$data" | jq -r --arg mode "$mode" '.[$mode].messages[]' | shuf -n 1)
          
          if [ -z "$greeting" ] || [ -z "$message" ]; then
            echo "No message found → exit"
            exit 0
          fi
          
          final_message="$greeting $message"
          
          # =========================
          # SEND TO TELEGRAM CHAT N CHANNEL
          # =========================
          
          curl -s -X POST https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage \
          -d chat_id="$TELEGRAM_CHANNEL_ID" \
          --data-urlencode "text=$final_message"
          
      # ✅ kalau sudah commit
      - name: Send Appreciation (Committed)
        if: steps.activity.outputs.no_commit == 'false' && needs.lock-check.outputs.allowed == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          # =========================
          # MODE N TIMEZONE
          # =========================
          
          export TZ=Asia/Jakarta
          hour=$(date +%H)
          
          mode=""
          
          if [ "$hour" -ge 12 ] && [ "$hour" -lt 18 ]; then
            mode="ambitious"
          elif [ "$hour" -ge 18 ] && [ "$hour" -lt 21 ]; then
            mode="productive"
          elif [ "$hour" -ge 21 ] || [ "$hour" -lt 7 ]; then
            mode="consistent"
          fi
          
          if [ -z "$mode" ]; then
            exit 0
          fi
          
          # =========================
          # MESSAGES (CASE)
          # =========================
          
          data=$(cat .github/messages/application.json)

          greeting=$(echo "$data" | jq -r --arg mode "$mode" '.[$mode].greetings[]' | shuf -n 1)
          
          message=$(echo "$data" | jq -r --arg mode "$mode" '.[$mode].messages[]' | shuf -n 1)
          
          if [ -z "$greeting" ] || [ -z "$message" ]; then
            echo "No message found → exit"
            exit 0
          fi
          
          final_message="$greeting $message"
          
          # =========================
          # SEND TO TELEGRAM CHAT N CHANNEL
          # =========================
          
          curl -s -X POST https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage \
          -d chat_id="$TELEGRAM_CHANNEL_ID" \
          --data-urlencode "text=$final_message"
          
      - name: Set Appreciation Lock
        if: steps.activity.outputs.no_commit == 'false'
        env:
          TOKEN: ${{ secrets.ACTIVITY_GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=1
          REPO="fridfn/workflow-development"
          
          curl -s -X POST \
           -H "Authorization: token $TOKEN" \
           -H "Accept: application/vnd.github+json" \
           https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/labels \
           -d '{
              "name": "appreciated-today",
              "color": "6b00c600",
              "description": "Indicates that today's commit activity has been acknowledged and appreciation has been sent."
            }' || true