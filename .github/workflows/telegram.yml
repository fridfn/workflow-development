name: Telegram Notifier

on:
  workflow_call:
    inputs:
      private_message:
        required: false
        type: string
      channel_message:
        required: false
        type: string
    secrets:
      TELEGRAM_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: false
      TELEGRAM_CHANNEL_ID:
        required: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Messages
        run: |
          # 💜 Kirim ke pribadi (kalau ada)
          if [ ! -z "${{ inputs.private_message }}" ]; then
            curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="${{ inputs.private_message }}"
          fi

          # 📢 Kirim ke channel (kalau ada)
          if [ ! -z "${{ inputs.channel_message }}" ]; then
            curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHANNEL_ID }} \
            -d text="${{ inputs.channel_message }}"
          fi